<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Top Edge Image</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Fredoka', sans-serif;
    }
  </style>
</head>

<body class="bg-yellow-100 m-0 p-0">

  <!-- Navbar -->
  <nav class="relative w-full bg-white border-b-4 border-black py-2 px-4">
    
    <div class="flex items-center justify-between md:justify-center">
      
      <!-- Name -->
      <h1 class="
        text-xl sm:text-2xl md:text-3xl
        font-bold 
        text-black 
        px-4 py-1
        bg-yellow-300 
        rounded-full 
        border-4 border-black 
        shadow-[3px_3px_0px_black]
      ">
        Tukaram Kitekar

    </div>

    <!-- ✅ IMAGE FROM VERY TOP EDGE -->
    <img 
      src="zoka.png" 
      alt="Character"
      class="
        absolute 
        right-2
        top-0
        w-28 sm:w-32 md:w-40

    >

<!-- Hero Section -->
<section class="w-full px-4 pt-16 md:pt-10 pb-6">

  <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center gap-4 md:gap-6">
    
    <!-- LEFT: Circular Image -->
    <div class="flex justify-center md:justify-end w-full md:w-1/2">
      
      <img 
        src="circularlogo.jpg" 
        alt="Profile"
        class="
          w-36 h-36 sm:w-44 sm:h-44 md:w-48 md:h-48
          object-cover 
          rounded-full
          border-4 border-black
        "
      >

    </div>

    <!-- RIGHT: Text -->
    <div class="w-full md:w-1/2 text-center md:text-left">
      
      <!-- Heading -->
      <h2 class="text-2xl sm:text-3xl md:text-4xl font-bold mb-2">
        Hi, I am Tukaram Kitekar
      </h2>

      <!-- Typing Text -->
      <p class="text-lg sm:text-xl font-semibold mb-2 h-7">
        <span id="typing" class="inline-block min-w-[180px]"></span>
        <span class="animate-pulse"></span>
      </p>

      <!-- Paragraph -->
      <p class="text-gray-700 text-sm sm:text-base leading-relaxed">
        I build modern, responsive, and high-performance websites 
        with clean design and smooth user experience.
      </p>

    </div>

  </div>

</section>






<!-- 🌊 Animated Water Wave Divider -->
<div class="w-full overflow-hidden leading-none">

  <svg 
    class="w-full h-[100px] md:h-[140px]" 
    viewBox="0 0 1440 320"
    preserveAspectRatio="none"
  >
    
    <!-- Back Wave -->
    <path 
      fill="#60a5fa" 
      fill-opacity="0.5"
      d="M0,160L60,149.3C120,139,240,117,360,122.7C480,128,600,160,720,176C840,192,960,192,1080,170.7C1200,149,1320,107,1380,85.3L1440,64V320H0Z"
    >
      <animate 
        attributeName="d" 
        dur="6s" 
        repeatCount="indefinite"
        values="
        M0,160L60,149.3C120,139,240,117,360,122.7C480,128,600,160,720,176C840,192,960,192,1080,170.7C1200,149,1320,107,1380,85.3L1440,64V320H0Z;

        M0,180L60,170C120,160,240,140,360,130C480,120,600,140,720,160C840,180,960,200,1080,190C1200,180,1320,140,1380,120L1440,100V320H0Z;

        M0,160L60,149.3C120,139,240,117,360,122.7C480,128,600,160,720,176C840,192,960,192,1080,170.7C1200,149,1320,107,1380,85.3L1440,64V320H0Z
        "
      />
    </path>

    <!-- Front Wave -->
    <path 
      fill="#3b82f6" 
      fill-opacity="0.8"
      d="M0,200L80,186.7C160,173,320,147,480,160C640,173,800,224,960,218.7C1120,213,1280,149,1360,117.3L1440,85V320H0Z"
    >
      <animate 
        attributeName="d" 
        dur="4s" 
        repeatCount="indefinite"
        values="
        M0,200L80,186.7C160,173,320,147,480,160C640,173,800,224,960,218.7C1120,213,1280,149,1360,117.3L1440,85V320H0Z;

        M0,220L80,210C160,200,320,180,480,170C640,160,800,180,960,200C1120,220,1280,200,1360,180L1440,160V320H0Z;

        M0,200L80,186.7C160,173,320,147,480,160C640,173,800,224,960,218.7C1120,213,1280,149,1360,117.3L1440,85V320H0Z
        "
      />
    </path>

  </svg>

</div>



















  
<!-- Typing Script -->
<script>
  const texts = ["Web Developer", "App Developer"];
  let i = 0;
  let j = 0;
  let currentText = "";
  let isDeleting = false;

  function type() {
    currentText = texts[i];

    if (!isDeleting) {
      document.getElementById("typing").innerHTML = currentText.substring(0, j + 1);
      j++;
      if (j === currentText.length) {
        isDeleting = true;
        setTimeout(type, 1200);
        return;
      }
    } else {
      document.getElementById("typing").innerHTML = currentText.substring(0, j - 1);
      j--;
      if (j === 0) {
        isDeleting = false;
        i = (i + 1) % texts.length;
      }
    }

    setTimeout(type, isDeleting ? 40 : 80);
  }

  type();
</script>




  
  

</body>
</html>
