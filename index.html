<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Top Edge Image</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Fredoka', sans-serif;
    }
  </style>
</head>

<body class="bg-yellow-100 m-0 p-0">

  <!-- Navbar -->
  <nav class="relative w-full bg-white border-b-4 border-black py-2 px-4">
    
    <div class="flex items-center justify-between md:justify-center">
      
      <!-- Name -->
      <h1 class="
        text-xl sm:text-2xl md:text-3xl
        font-bold 
        text-black 
        px-4 py-1
        bg-yellow-300 
        rounded-full 
        border-4 border-black 
        shadow-[3px_3px_0px_black]
      ">
        Tukaram Kitekar
      </h1>

    </div>

    <!-- ✅ IMAGE FROM VERY TOP EDGE -->
    <img 
      src="zoka.png" 
      alt="Character"
      class="
        absolute 
        right-2
        top-0
        w-28 sm:w-32 md:w-40
        h-auto
      "
    >

  </nav>





<!-- Hero Section -->
<section class="w-full px-4 py-10">

  <div class="max-w-6xl mx-auto flex flex-col md:flex-row items-center gap-8">
    
    <!-- LEFT: Circular Image -->
    <div class="flex justify-center md:justify-start w-full md:w-1/2">
      
      <div class="
        bg-yellow-300 
        p-4 
        rounded-full 
        border-4 border-black 
        shadow-[5px_5px_0px_black]
      ">
        <img 
          src="your-image.png" 
          alt="Profile"
          class="
            w-40 h-40 sm:w-48 sm:h-48
            object-cover 
            rounded-full
          "
        >
      </div>

    </div>

    <!-- RIGHT: Text Content -->
    <div class="w-full md:w-1/2 text-center md:text-left">
      
      <!-- Heading -->
      <h2 class="
        text-2xl sm:text-3xl md:text-4xl
        font-bold 
        mb-3
      ">
        Hi, I am <span class="text-black bg-yellow-300 px-2 rounded-md border-2 border-black">Tukaram Kitekar</span>
      </h2>

      <!-- Subheading -->
      <p class="
        text-lg sm:text-xl 
        font-semibold 
        mb-3
      ">
        Web Developer
      </p>

      <!-- Paragraph -->
      <p class="
        text-gray-700 
        text-sm sm:text-base
        leading-relaxed
      ">
        I build modern, responsive, and high-performance websites 
        with clean design and smooth user experience.  
        Passionate about creating digital products that people love to use.
      </p>

    </div>

  </div>

</section>







  

</body>
</html>
