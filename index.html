<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <!-- ✅ Fix mobile responsiveness -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Cartoon Navbar</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Cartoon Font -->
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Fredoka', sans-serif;
    }
  </style>
</head>

<body class="bg-yellow-100 m-0 p-0">

  <!-- Navbar -->
  <nav class="relative w-full bg-white border-b-4 border-black py-2 px-4">
    
    <!-- Flex Layout -->
    <div class="flex items-center justify-between md:justify-center">
      
      <!-- Name -->
      <h1 class="
        text-xl sm:text-2xl md:text-3xl
        font-bold 
        text-black 
        px-4 py-1
        bg-yellow-300 
        rounded-full 
        border-4 border-black 
        shadow-[3px_3px_0px_black]
      ">
        Tukaram Kitekar
      </h1>

    </div>

    <!-- Image (20% inside navbar, 80% below) -->
    <img 
      src="zoka.png" 
      alt="Character"
      class="
        absolute 
        right-3
        top-full
        -translate-y-1/4
        w-24 sm:w-28 md:w-36
        h-auto
        pointer-events-none
      "
    >

  </nav>

</body>
</html>
